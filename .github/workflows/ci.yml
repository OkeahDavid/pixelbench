name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # setuptools-scm derives the version from git tags
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.2.0

      # opencv-python needs system OpenGL/GLib libs that the runner lacks
      - name: Install OpenCV system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Sync environment
        run: uv sync

      - name: Run unit and integration tests
        id: pytest
        run: |
          set -o pipefail
          uv run pytest --cov=pixelbench -q | tee /tmp/pytest.out

      - name: Write test summary
        if: always()
        run: |
          if [ "${{ steps.pytest.outcome }}" = "success" ]; then MARK="✅ Passed"; else MARK="❌ Failed"; fi
          {
            echo "## CLI tests"
            echo ""
            echo "$MARK — $(tail -n 1 /tmp/pytest.out)"
            echo ""
            echo "### Coverage"
            echo ""
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run benchmark (CPU-only smoke test)
        run: uv run pixelbench --sizes 720p --tasks grayscale,threshold,canny --iterations 3 --no-gpu

      - name: Verify JSON export
        run: |
          uv run pixelbench --sizes 720p --tasks grayscale --iterations 2 --no-gpu --json /tmp/out.json
          python3 -c "import json; d = json.load(open('/tmp/out.json')); assert d['measurements'], 'no measurements in JSON'"

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        id: vitest
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          npm test -- --coverage --coverage.reporter=text | tee /tmp/vitest.out

      - name: Write test summary
        if: always()
        run: |
          if [ "${{ steps.vitest.outcome }}" = "success" ]; then MARK="✅ Passed"; else MARK="❌ Failed"; fi
          # Strip any remaining ANSI escapes before extracting lines
          sed -r 's/\x1b\[[0-9;]*m//g' /tmp/vitest.out > /tmp/vitest.txt || true
          {
            echo "## Web tests"
            echo ""
            echo "$MARK"
            echo ""
            echo '```'
            grep -E "Test Files|Tests " /tmp/vitest.txt || echo "(test counts not found)"
            echo '```'
            echo ""
            echo "### Coverage"
            echo ""
            echo '```'
            sed -n '/% Coverage report/,$p' /tmp/vitest.txt | grep -v '^=*$' || echo "(coverage table not found)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Type-check and build
        run: npm run build
