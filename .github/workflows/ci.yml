name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # opencv-python needs system OpenGL/GLib libs that the runner lacks
      - name: Install OpenCV system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Sync environment
        run: uv sync

      - name: Run benchmark (CPU-only smoke test)
        run: uv run pixelbench --sizes 720p --tasks grayscale,threshold,canny --iterations 3 --no-gpu

      - name: Verify JSON export
        run: |
          uv run pixelbench --sizes 720p --tasks grayscale --iterations 2 --no-gpu --json /tmp/out.json
          python3 -c "import json; d = json.load(open('/tmp/out.json')); assert d['measurements'], 'no measurements in JSON'"

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
