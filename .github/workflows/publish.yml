name: Publish to PyPI

# Publishes when a version tag (v0.2.0, v1.0.0, ...) is pushed — including
# the tag created by publishing a GitHub release. Tag pushes are push events,
# so the run shows as a check on the tagged commit.
# Uses PyPI trusted publishing (OIDC) — no API token stored in the repo.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check release tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag v$TAG does not match pyproject.toml version $VERSION" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
